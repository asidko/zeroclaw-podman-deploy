name: Bug Report
description: Something isn't working
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `./run.sh start`
        2. ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Output of `./run.sh logs` or the error message
      render: shell
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: Ubuntu 24.04, Fedora 40, etc.
    validations:
      required: true
  - type: input
    id: podman-version
    attributes:
      label: Podman version
      placeholder: "Output of `podman --version`"
    validations:
      required: true
